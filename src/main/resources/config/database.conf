datasource {
  jdbc-url = "jdbc:postgresql://localhost:5432/conduit"
  jdbc-url = ${?DB_URL}
  user = "conduit"
  user = ${?DB_USER}
  password = "conduit"
  password = ${?DB_PASSWORD}
  pool-size = 10
  connection-test-query = "SELECT 1"
  driver-class = "org.postgresql.Driver"
  connection-timeout = 60 seconds
}
migration {
  init-sql = "SET search_path TO public"
  locations = ["classpath:migrations/schema"]
  parameters = {}
  placeholders = {}
  allow-clean = false
}
