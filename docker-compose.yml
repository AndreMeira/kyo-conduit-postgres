services:
  postgres:
    image: postgres:17
    container_name: conduit-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: conduit
      POSTGRES_USER: conduit
      POSTGRES_PASSWORD: conduit
    volumes:
      - conduit-data:/var/lib/postgresql/data

  app:
    image: conduit-kyo-postgres:latest
    container_name: conduit-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: "jdbc:postgresql://postgres:5432/conduit"
    depends_on:
      - postgres

volumes:
  conduit-data:
